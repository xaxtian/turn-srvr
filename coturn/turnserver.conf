# ─────────────────────────────────────────────────────────────────────────────
# turnserver.conf — usado por el docker-compose.yml
# Los valores se leen de variables de entorno definidas en .env
#
# Para editar: modifica el .env, NO este archivo directamente.
# ─────────────────────────────────────────────────────────────────────────────

external-ip=TURN_PUBLIC_IP_PLACEHOLDER
listening-ip=0.0.0.0
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

realm=TURN_SERVER_HOST_PLACEHOLDER
server-name=TURN_SERVER_HOST_PLACEHOLDER

use-auth-secret
static-auth-secret=TURN_SECRET_PLACEHOLDER

cert=/etc/letsencrypt/live/TURN_SERVER_HOST_PLACEHOLDER/fullchain.pem
pkey=/etc/letsencrypt/live/TURN_SERVER_HOST_PLACEHOLDER/privkey.pem

no-loopback-peers
no-multicast-peers
no-auth
no-cli

log-file=stdout
new-log-timestamp
simple-log
